# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.82
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.82,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:deck
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:deck
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:deck
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:deck
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:deck

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# menu and terminal
bind=Super,d,spawn,rofi -show combi
bind=Super,Return,spawn,kitty --single-instance
bind=Super,space,spawn,emacsclient -n -c

# Key Mode - Common.
# Common keymode keybindings, these apply in all keymodes.
keymode=common

# Keymode bindings.
bind=Super,x,setkeymode,window

# Escape all keymodes.
bind=Super,Escape,setkeymode,default

# reload config
bind=Super,r,reload_config

bind=Super,n,setkeymode,notification

keymode=default

# Window relevant commands.
keymode=window

# Emacs style window search.
bind=None,b,spawn_shell,rofi -show window
bind=None,b,setkeymode,default

keymode=default

keymode=notification

bind=None,Return,spawn_shell,fnottctl action default
bind=None,Return,setkeymode,default

bind=None,Escape,spawn_shell,fnottctl dismiss
bind=None,Escape,setkeymode,default

bind=Shift,Escape,spawn_shell,fnottctl dismiss all
bind=Shift,Escape,setkeymode,default

keymode=default

# exit
bind=Super+Alt,e,quit
bind=Super,q,killclient,

# switch window focus
bind=Super,period,focusstack,next
bind=Super,comma,focusstack,prev
bind=Super,h,focusdir,left
bind=Super,l,focusdir,right
bind=Super,j,focusdir,down
bind=Super,k,focusdir,up

# swap window
bind=Super+Shift,period,exchange_stack_client,next
bind=Super+Shift,comma,exchange_stack_client,prev
bind=Super+Shift,j,exchange_client,up
bind=Super+Shift,k,exchange_client,down
bind=Super+Shift,h,exchange_client,left
bind=Super+Shift,l,exchange_client,right
bind=Super,z,zoom

# switch window status
bind=Super,g,toggleglobal,
bind=Super,o,toggleoverview,
bind=Super,backslash,togglefloating,
bind=Super,a,togglemaximizescreen,
bind=Super,f,togglefullscreen,
bind=Super+Shift,f,togglefakefullscreen,
bind=Super,i,minimized,
bind=Super+Alt,o,toggleoverlay,
bind=Super+Shift,I,restore_minimized
bind=Super,s,toggle_scratchpad

# scroller layout
bind=Super+Shift,e,set_proportion,1.0
bind=Super+Shift,x,switch_proportion_preset,

# switch layout
bind=Super,y,switch_layout

# Layout prefixes.
bind=Super+Alt,t,setlayout,tile
bind=Super+Alt,d,setlayout,deck
bind=Super+Alt,s,setlayout,scroller
bind=Super+Alt,m,setlayout,monocle

bind=Super,w,setkeymode,kbptr

keymode=kbptr

bind=Super,f,spawn_shell,wl-kbptr -o modes=floating,click -o mode_floating.source=detect
bind=Super,f,setkeymode,default
bind=Super,s,spawn_shell,wl-kbptr -o modes=split
bind=Super,s,setkeymode,default
bind=Super,t,spawn_shell,wl-kbptr -o modes=tile
bind=Super,t,setkeymode,default

keymode=default

# tag switch
bind=Super,Left,viewtoleft,0
bind=Super+Ctrl+Alt,Left,viewtoleft_have_client,0
bind=Super,Right,viewtoright,0
bind=Super+Ctrl+Alt,Right,viewtoright_have_client,0
bind=Ctrl+Super,Left,tagtoleft,0
bind=Ctrl+Super,Right,tagtoright,0

# Switch view like a workspace.
bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0
bind=Super,0,view,0,0

# Comboview. The first view determines the layout.
bind=Super+Alt,1,comboview,1
bind=Super+Alt,2,comboview,2
bind=Super+Alt,3,comboview,3
bind=Super+Alt,4,comboview,4
bind=Super+Alt,5,comboview,5
bind=Super+Alt,6,comboview,6
bind=Super+Alt,7,comboview,7
bind=Super+Alt,8,comboview,8
bind=Super+Alt,9,comboview,9
bind=Super+Alt,0,comboview,0

# Toggle whether to view the windows of another view.
bind=Super+Ctrl,1,toggleview,1
bind=Super+Ctrl,2,toggleview,2
bind=Super+Ctrl,3,toggleview,3
bind=Super+Ctrl,4,toggleview,4
bind=Super+Ctrl,5,toggleview,5
bind=Super+Ctrl,6,toggleview,6
bind=Super+Ctrl,7,toggleview,7
bind=Super+Ctrl,8,toggleview,8
bind=Super+Ctrl,9,toggleview,9
bind=Super+Ctrl,0,toggleview,0

# Toggle a tag on a window.
bind=Super+Ctrl+Shift,1,toggletag,1
bind=Super+Ctrl+Shift,2,toggletag,2
bind=Super+Ctrl+Shift,3,toggletag,3
bind=Super+Ctrl+Shift,4,toggletag,4
bind=Super+Ctrl+Shift,5,toggletag,5
bind=Super+Ctrl+Shift,6,toggletag,6
bind=Super+Ctrl+Shift,7,toggletag,7
bind=Super+Ctrl+Shift,8,toggletag,8
bind=Super+Ctrl+Shift,9,toggletag,9
bind=Super+Ctrl+Shift,0,toggletag,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Super+Shift,1,tag,1,0
bind=Super+Shift,2,tag,2,0
bind=Super+Shift,3,tag,3,0
bind=Super+Shift,4,tag,4,0
bind=Super+Shift,5,tag,5,0
bind=Super+Shift,6,tag,6,0
bind=Super+Shift,7,tag,7,0
bind=Super+Shift,8,tag,8,0
bind=Super+Shift,9,tag,9,0

# monitor switch
bind=Super+Alt+Shift,Left,focusmon,left
bind=Super+Alt+Shift,Right,focusmon,right
bind=Super+Alt,Left,tagmon,left
bind=Super+Alt,Right,tagmon,right

# gaps
bind=Super+Alt+Shift,X,incgaps,1
bind=Super+Alt+Shift,Z,incgaps,-1
bind=Super+Alt+Shift,R,togglegaps

# movewin
bind=Super+Ctrl+Shift,k,movewin,+0,-50
bind=Super+Ctrl+Shift,j,movewin,+0,+50
bind=Super+Ctrl+Shift,h,movewin,-50,+0
bind=Super+Ctrl+Shift,l,movewin,+50,+0

# resizewin
bind=Super+Ctrl,k,resizewin,+0,-50
bind=Super+Ctrl,j,resizewin,+0,+50
bind=Super+Ctrl,h,resizewin,-50,+0
bind=Super+Ctrl,l,resizewin,+50,+0

# Mouse Button Bindings
# None mode key only work in ov mode
mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_right,moveresize,curresize
# mousebind=None,btn_left,toggleoverview,1
# mousebind=None,btn_right,killclient,0

# Axis Bindings
axisbind=Super,UP,viewtoleft_have_client
axisbind=Super,DOWN,viewtoright_have_client

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

layerrule=noblur:1,layer_name:selection
